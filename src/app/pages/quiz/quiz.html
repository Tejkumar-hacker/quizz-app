<div class="quiz-topbar">

  <!-- HOME -->
  <button
    class="home-btn"
    (click)="goToHome()"
  >
    🏠 Home
  </button>

  <!-- CENTER INFO -->
  <div class="topbar-info">

    <span>
      {{ quizType | uppercase }}
    </span>

    <span>
      {{ section }}
    </span>

    <span>
      {{ sectionQuestionCount }} Questions
    </span>

  </div>

  <!-- BUTTONS -->
  <div class="topbar-buttons">

    <button
      class="back-btn"
      (click)="goToSections()"
    >
      ⬅ Back
    </button>

    <button
      class="shuffle-btn"
      (click)="shuffleQuestions()"
    >
      🔀 Shuffle
    </button>

    <button
      class="bottom-btn"
      (click)="scrollToBottom()"
    >
      ⬇ Bottom
    </button>

  </div>

</div>

<!-- QUESTIONS -->
<div *ngIf="questions && questions.length > 0; else loading">

  <!-- HEADER -->
  <div class="quiz-header">

    <h2>{{ section }} Quiz</h2>

    <div class="quiz-info">
      Answered {{ answeredCount }} / {{ questions.length }}
    </div>

  </div>

  <!-- PROGRESS -->
  <div class="progress-bar">

    <div
      class="progress-fill"
      [style.width.%]="
        (answeredCount / questions.length) * 100
      "
    ></div>

  </div>

  <!-- QUESTION LIST -->
  <div
    *ngFor="
      let q of questions;
      let i = index
    "
    class="question-card"
  >

    <div class="question-number">
      Question {{ i + 1 }}
    </div>

    <h3>{{ q.question }}</h3>

    <!-- OPTIONS -->
    <div class="options">

      <div
        *ngFor="let opt of q.options"
        (click)="selectAnswer(i, opt, q)"
        class="option"

        [class.selected]="
          opt === userAnswers[i]
        "

        [class.correct]="
          submittedMap[i] &&
          opt === q.correctAnswer
        "

        [class.wrong]="
          submittedMap[i] &&
          opt === userAnswers[i] &&
          opt !== q.correctAnswer
        "
      >
        {{ opt }}
      </div>

    </div>

    <!-- EXPLANATION -->
    <div
      class="explanation"
      *ngIf="submittedMap[i]"
    >
      <strong>Explanation:</strong>
      {{ q.explanation }}
    </div>

  </div>

  <!-- FINISH -->
  <div class="finish-container">

    <button
      class="finish-btn"
      (click)="finishQuiz()"
      [disabled]="
        answeredCount !== questions.length
      "
    >
      Finish Quiz
    </button>

  </div>

  <!-- PAGINATION -->
  <div
    class="pagination-container"
    *ngIf="totalBatches > 1"
  >

    <button
      (click)="goToBatch(batch - 1)"
      [disabled]="batch === 1"
    >
      « Prev
    </button>

    <button
      *ngFor="
        let b of [].constructor(totalBatches);
        let i = index
      "
      (click)="goToBatch(i + 1)"
      [class.active]="batch === i + 1"
    >
      {{ i + 1 }}
    </button>

    <button
      (click)="goToBatch(batch + 1)"
      [disabled]="batch === totalBatches"
    >
      Next »
    </button>

  </div>

  <!-- BACK TO TOP -->
  <div class="scroll-top-container">

    <button
      class="scroll-top-btn"
      (click)="scrollToTop()"
    >
      ⬆ Back To Top
    </button>

  </div>

</div>

<!-- LOADING -->
<ng-template #loading>

  <div class="loading">
    Loading questions...
  </div>

</ng-template>
