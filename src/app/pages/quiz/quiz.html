<div *ngIf="questions$ | async as questions; else loading">

  <!-- PROGRESS -->
  <div class="progress-text">
    Question {{ currentIndex + 1 }} / {{ questions.length }}
  </div>

  <div class="progress-bar">
    <div
      class="progress-fill"
      [style.width.%]="(answeredCount / questions.length) * 100"
    ></div>
  </div>

  <!-- 🔥 QUESTION PALETTE -->
  <div class="palette">
    <div
      *ngFor="let q of questions; let i = index"
      (click)="goToQuestion(i)"
      class="palette-item"

      [class.current]="i === currentIndex"
      [class.visited]="visitedMap[i]"
      [class.answered]="userAnswers[i] && !submittedMap[i]"
      [class.submitted]="submittedMap[i]"
    >
      {{ i + 1 }}
    </div>
  </div>

  <!-- QUESTION -->
  <div *ngIf="questions[currentIndex] as q" class="question-card">

    <h3>{{ q.question }}</h3>

    <!-- OPTIONS -->
    <div class="options">
      <div
        *ngFor="let opt of q.options"
        (click)="select(opt)"
        class="option"
        [class.selected]="opt === userAnswers[currentIndex]"
        [class.correct]="submittedMap[currentIndex] && opt === q.correctAnswer"
        [class.wrong]="submittedMap[currentIndex] && opt === userAnswers[currentIndex] && opt !== q.correctAnswer"
      >
        {{ opt }}
      </div>
    </div>
    
    <!-- ADD THIS BELOW OPTIONS
    <div class="timer" *ngIf="submittedMap[currentIndex] && countdown > 0">
      ⏱ Auto next in {{ countdown }}s
    </div> -->

    <!-- KEYBOARD HINTS -->
    <div class="keyboard-hints">
      <span><b>1–4</b> Select</span>
      <span><b>S / Enter</b> Submit</span>
      <span><b>N / →</b> Next</span>
      <span><b>←</b> Previous</span>
    </div>

    <!-- ACTIONS -->
    <div class="actions">

      <button (click)="previous()" [disabled]="currentIndex === 0">
        Previous
      </button>

      <button
        (click)="submit(q)"
        [disabled]="!userAnswers[currentIndex] || submittedMap[currentIndex]"
      >
        Submit
      </button>

      <button
        (click)="next(questions.length)"
        [disabled]="!submittedMap[currentIndex]"
      >
        {{ currentIndex === questions.length - 1 ? 'Finish' : 'Next' }}
      </button>

    </div>
    <!-- 🔥 SIMPLE PAGINATION (NO BOOTSTRAP) -->
<div class="pagination-container" *ngIf="totalBatches > 1">

  <button
    (click)="goToBatch(batch - 1)"
    [disabled]="batch === 1"
  >
    « Prev
  </button>

  <button
    *ngFor="let b of [].constructor(totalBatches); let i = index"
    (click)="goToBatch(i + 1)"
    [class.active]="batch === i + 1"
  >
    {{ i + 1 }}
  </button>

  <button
    (click)="goToBatch(batch + 1)"
    [disabled]="batch === totalBatches"
  >
    Next »
  </button>

</div>

  </div>

</div>


<ng-template #loading>
  <p>Loading questions...</p>
</ng-template>
