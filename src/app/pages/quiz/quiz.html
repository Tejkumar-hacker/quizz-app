<div class="quiz-topbar">
  <button (click)="goToHome()">🏠 Home</button>
</div>

<div *ngIf="questions$ | async as questions; else loading">

  <!-- HEADER -->
  <div class="quiz-header">

    <h2>{{ section }} Quiz</h2>

    <div class="quiz-info">
      Answered {{ answeredCount }} / {{ questions.length }}
    </div>

  </div>

  <!-- PROGRESS -->
  <div class="progress-bar">
    <div
      class="progress-fill"
      [style.width.%]="(answeredCount / questions.length) * 100"
    ></div>
  </div>

  <!-- ALL QUESTIONS -->
  <div
    *ngFor="let q of questions; let i = index"
    class="question-card"
  >

    <!-- QUESTION NUMBER -->
    <div class="question-number">
      Question {{ i + 1 }}
    </div>

    <!-- QUESTION -->
    <h3>{{ q.question }}</h3>

    <!-- OPTIONS -->
    <div class="options">

      <div
        *ngFor="let opt of q.options"
        (click)="selectAnswer(i, opt, q)"
        class="option"

        [class.selected]="opt === userAnswers[i]"

        [class.correct]="
          submittedMap[i] &&
          opt === q.correctAnswer
        "

        [class.wrong]="
          submittedMap[i] &&
          opt === userAnswers[i] &&
          opt !== q.correctAnswer
        "
      >
        {{ opt }}
      </div>

    </div>

    <!-- EXPLANATION -->
    <div
      class="explanation"
      *ngIf="submittedMap[i]"
    >
      <strong>Explanation:</strong>
      {{ q.explanation }}
    </div>

  </div>

  <!-- FINISH BUTTON -->
  <div class="finish-container">

    <button
      class="finish-btn"
      (click)="finishQuiz()"
      [disabled]="answeredCount !== questions.length"
    >
      Finish Quiz
    </button>

  </div>

  <!-- PAGINATION -->
  <div
    class="pagination-container"
    *ngIf="totalBatches > 1"
  >

    <button
      (click)="goToBatch(batch - 1)"
      [disabled]="batch === 1"
    >
      « Prev
    </button>

    <button
      *ngFor="let b of [].constructor(totalBatches); let i = index"
      (click)="goToBatch(i + 1)"
      [class.active]="batch === i + 1"
    >
      {{ i + 1 }}
    </button>

    <button
      (click)="goToBatch(batch + 1)"
      [disabled]="batch === totalBatches"
    >
      Next »
    </button>

  </div>

</div>

<ng-template #loading>
  <p>Loading questions...</p>
</ng-template>
